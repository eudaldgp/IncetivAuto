<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IncentivAuto Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <style>
        :root {
            --color-brand: #011224; 
            --color-accent: #00C897; 
            --color-brand-soft: #f1f5f9;
        }
        .bg-brand { background-color: var(--color-brand); }
        .text-brand { color: var(--color-brand); }
        .border-brand { border-color: var(--color-brand); }
        .bg-brand-soft { background-color: var(--color-brand-soft); }
        .text-brand-soft { color: var(--color-brand-soft); }
        .bg-accent { background-color: var(--color-accent); }
        .text-accent { color: var(--color-accent); }
        .border-accent { border-color: var(--color-accent); }
        
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .animate-slide-down { animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .focus-ring:focus { border-color: var(--color-accent); outline: none; box-shadow: 0 0 0 2px rgba(0,0,0,0.05); transition: all 0.2s; }
        
        .pdf-content { font-family: sans-serif; }
        .pdf-content tr { page-break-inside: avoid; }
        .pdf-content table { page-break-inside: auto; }
        .watermark-layer { pointer-events: none; user-select: none; }
    </style>
</head>
    <link rel="manifest" href="manifest.json">
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
<body class="bg-gray-200 h-screen w-screen flex justify-center items-center antialiased overflow-hidden p-0 sm:p-4">

    <div id="root" class="w-full max-w-[450px] h-full sm:max-h-[900px] bg-white shadow-2xl sm:rounded-[2.5rem] overflow-hidden relative flex flex-col"></div>

    <script type="text/babel">

        const THEMES = [
            { id: 'default', nombre: 'IncentivAuto', brand: '#011224', accent: '#00C897', icon: 'app_logo' },
            { id: 'audi', nombre: 'Audi', brand: '#000000', accent: '#e3000f', icon: 'audi' },
            { id: 'vw', nombre: 'Volkswagen', brand: '#001e50', accent: '#00b0f0', icon: 'volkswagen' },
            { id: 'seat', nombre: 'Seat', brand: '#1a1a1a', accent: '#e43013', icon: 'seat' },
            { id: 'skoda', nombre: 'Skoda', brand: '#10271d', accent: '#4ba82e', icon: 'skoda' },
            { id: 'bmw', nombre: 'BMW', brand: '#1c1c1c', accent: '#0066b1', icon: 'bmw' },
            { id: 'mercedes', nombre: 'Mercedes-Benz', brand: '#000000', accent: '#666666', icon: 'mercedes' },
            { id: 'toyota', nombre: 'Toyota', brand: '#111111', accent: '#eb0a1e', icon: 'toyota' },
            { id: 'ford', nombre: 'Ford', brand: '#003478', accent: '#00a2e8', icon: 'ford' },
            { id: 'peugeot', nombre: 'Peugeot', brand: '#002e5f', accent: '#00a2e8', icon: 'peugeot' },
            { id: 'renault', nombre: 'Renault', brand: '#111111', accent: '#ffcc33', icon: 'renault' },
            { id: 'citroen', nombre: 'Citroën', brand: '#4e5154', accent: '#da291c', icon: 'citroen' },
            { id: 'nissan', nombre: 'Nissan', brand: '#000000', accent: '#c3002f', icon: 'nissan' },
            { id: 'hyundai', nombre: 'Hyundai', brand: '#002c5f', accent: '#00aad2', icon: 'hyundai' },
            { id: 'kia', nombre: 'Kia', brand: '#05141f', accent: '#bb162b', icon: 'kia' },
            { id: 'opel', nombre: 'Opel', brand: '#000000', accent: '#f7ff14', icon: 'opel' },
            { id: 'honda', nombre: 'Honda', brand: '#111111', accent: '#e4000f', icon: 'honda' },
            { id: 'mazda', nombre: 'Mazda', brand: '#111111', accent: '#910028', icon: 'mazda' },
            { id: 'volvo', nombre: 'Volvo', brand: '#14315c', accent: '#00aad2', icon: 'volvo' },
            { id: 'dacia', nombre: 'Dacia', brand: '#222222', accent: '#ff6600', icon: 'dacia' },
        ];

        const getBrandIconUrl = (theme, forceColor = null) => {
            const color = forceColor ? forceColor.replace('#', '') : theme.accent.replace('#', '');
            if (theme.id === 'mercedes') {
                const svg = `<svg viewBox="0 0 24 24" fill="%23${color}" xmlns="http://www.w3.org/2000/svg"><path d="M12 1.5A10.5 10.5 0 1 0 22.5 12 10.512 10.512 0 0 0 12 1.5Zm0 20A9.5 9.5 0 1 1 21.5 12 9.51 9.51 0 0 1 12 21.5Z"/><path d="M11.64 11.45V2.63h.72v8.82l7.65 4.41-.36.63-7.29-4.2-7.29 4.2-.36-.63z"/></svg>`;
                return `data:image/svg+xml;charset=utf-8,${svg}`;
            }
            return `https://cdn.simpleicons.org/${theme.icon}/${color}`;
        };

        const generateTint = (hex, percent) => {
            const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            const t = (c) => Math.round(c + (255 - c) * percent).toString(16).padStart(2, '0');
            return `#${t(r)}${t(g)}${t(b)}`;
        };

        const formatoEuro = (num) => num.toFixed(2).replace('.', ',') + ' €';
        const mesesNombres = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];

        const procesarImagen = (file, maxWidth = 800, quality = 0.7) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width; let height = img.height;
                        if (width > maxWidth) { height = Math.round((height * maxWidth) / width); width = maxWidth; }
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.onerror = reject; img.src = e.target.result;
                };
                reader.onerror = reject; reader.readAsDataURL(file);
            });
        };

        const IconBtn = ({ icon, onClick, className="" }) => (
            <button onClick={onClick} className={`p-2 flex items-center justify-center transition active:scale-90 ${className}`}>
                <span className="material-symbols-outlined text-[28px]">{icon}</span>
            </button>
        );

        const BotonBusqueda = ({ onClick }) => (
            <button onClick={onClick} className="text-white hover:opacity-80 transition p-1 flex items-center justify-center">
                <span className="material-symbols-outlined text-[26px]">search</span>
            </button>
        );

        const CampanaNotificaciones = ({ onClick, unread }) => (
            <button onClick={onClick} className="relative text-white hover:opacity-80 transition p-1 flex items-center justify-center">
                <span className="material-symbols-outlined text-[26px]">notifications</span>
                {unread && ( <span className="absolute top-1.5 right-1.5 w-2.5 h-2.5 bg-accent rounded-full border border-brand animate-pulse"></span> )}
            </button>
        );

        const BotonMenuPerfil = ({ icono, titulo, onClick, variant="default" }) => {
            const isDanger = variant === 'danger';
            return (
                <button onClick={onClick} className={`w-full flex items-center justify-between p-4 rounded-2xl shadow-sm border transition group bg-white ${isDanger ? 'border-red-100 bg-red-50' : 'border-gray-100'}`}>
                    <div className="flex items-center gap-4">
                        <div className={`w-12 h-12 rounded-xl flex items-center justify-center flex-shrink-0 ${isDanger ? 'bg-red-100 text-red-600' : 'bg-gray-50 text-accent'}`}><span className="material-symbols-outlined text-[22px]">{icono}</span></div>
                        <span className={`font-bold text-[15px] leading-none mt-0.5 ${isDanger ? 'text-red-700' : 'text-brand'}`}>{titulo}</span>
                    </div>
                    <span className={`material-symbols-outlined ${isDanger ? 'text-red-300' : 'text-gray-300'}`}>chevron_right</span>
                </button>
            );
        };

        const ResumenMensualModal = ({ operaciones, perfil, onClose }) => {
            const mesActual = new Date().getMonth();
            const añoActual = new Date().getFullYear();
            
            const opsMes = operaciones.filter(op => {
                const d = new Date(op.fecha);
                return d.getMonth() === mesActual && d.getFullYear() === añoActual;
            });

            const resumenProd = {};
            opsMes.forEach(op => {
                if (op.desglose) {
                    op.desglose.forEach(item => {
                        if (!resumenProd[item.nombre]) { 
                            let iconoProd = 'inventory_2';
                            const incDef = (perfil.incentives || []).find(i => i.id === item.idIncentivo);
                            if (incDef && incDef.icono) iconoProd = incDef.icono;
                            resumenProd[item.nombre] = { unidades: 0, total: 0, icono: iconoProd }; 
                        }
                        resumenProd[item.nombre].unidades += item.cantidad;
                        resumenProd[item.nombre].total += item.totalGenerado;
                    });
                }
            });

            const arrayResumen = Object.keys(resumenProd).map(key => ({ 
                nombre: key, 
                unidades: resumenProd[key].unidades, 
                total: resumenProd[key].total,
                icono: resumenProd[key].icono
            })).sort((a,b) => b.unidades - a.unidades);

            const totalMes = arrayResumen.reduce((sum, item) => sum + item.total, 0);

            return (
                <div className="absolute inset-0 bg-black/70 z-[200] flex flex-col justify-end animate-fade-in">
                    <div className="bg-gray-50 rounded-t-[2.5rem] h-[85%] flex flex-col shadow-2xl relative">
                        <div className="bg-white p-6 pb-6 border-b border-gray-100 relative z-20 shadow-sm">
                            <IconBtn icon="close" onClick={onClose} className="absolute top-4 right-4 text-gray-400" />
                            <h2 className="text-2xl font-black text-brand mt-2">Desglose Mensual</h2>
                            <p className="text-sm font-bold text-gray-400 uppercase tracking-wider mt-1">{mesesNombres[mesActual]} {añoActual}</p>
                        </div>
                        <div className="overflow-y-auto flex-1 p-4 no-scrollbar space-y-3 pb-20 bg-transparent">
                            {arrayResumen.length === 0 ? (
                                <div className="flex flex-col items-center justify-center text-gray-400 mt-16">
                                    <span className="material-symbols-outlined text-6xl mb-4 text-gray-300">donut_small</span>
                                    <p className="text-sm font-bold">No hay incentivos registrados este mes.</p>
                                </div>
                            ) : (
                                <React.Fragment>
                                    <div className="bg-brand text-white p-5 rounded-[1.5rem] shadow-md flex justify-between items-center mb-4">
                                        <span className="font-bold uppercase text-xs tracking-widest text-white/70">Total del mes</span>
                                        <span className="text-2xl font-black text-accent">{formatoEuro(totalMes)}</span>
                                    </div>
                                    {arrayResumen.map((prod, idx) => (
                                        <div key={idx} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center">
                                            <div className="flex items-center gap-4">
                                                <div className="bg-brand-soft text-brand p-3 rounded-xl">
                                                    <span className="material-symbols-outlined">{prod.icono}</span>
                                                </div>
                                                <div>
                                                    <p className="font-bold text-brand text-sm">{prod.nombre}</p>
                                                    <p className="text-[11px] font-bold uppercase text-gray-400 mt-1">{prod.unidades} uds. vendidas</p>
                                                </div>
                                            </div>
                                            <p className="font-black text-accent text-lg">+{formatoEuro(prod.total)}</p>
                                        </div>
                                    ))}
                                </React.Fragment>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- NUEVO COMPONENTE: COPIA DE SEGURIDAD ---
        const CopiaSeguridadView = ({ onVolver, perfiles, lastThemeId }) => {
            const [mostrarRescate, setMostrarRescate] = React.useState(false);
            const [textoRescate, setTextoRescate] = React.useState('');
            const fileInputRef = React.useRef(null);

            const handleExport = () => {
                const data = { perfiles: perfiles, lastThemeId: lastThemeId };
                const blob = new Blob([JSON.stringify(data)], {type: "application/json"});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `IncentivAuto_Backup_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
            };

            const procesarImportacion = (jsonData) => {
                try {
                    let nuevosPerfiles = [];
                    let nuevoTema = lastThemeId;

                    if (Array.isArray(jsonData)) {
                        // Formato antiguo (el texto de rescate)
                        nuevosPerfiles = jsonData;
                    } else if (jsonData.perfiles) {
                        // Formato nuevo (.json de backup)
                        nuevosPerfiles = jsonData.perfiles;
                        if (jsonData.lastThemeId) nuevoTema = jsonData.lastThemeId;
                    } else {
                        throw new Error("Formato no reconocido");
                    }

                    localStorage.setItem('inc_v22_p', JSON.stringify(nuevosPerfiles));
                    localStorage.setItem('inc_v22_lt', nuevoTema);
                    alert("¡Datos restaurados con éxito! La app se reiniciará.");
                    window.location.reload();
                } catch (error) {
                    alert("Error al leer los datos. Asegúrate de que el archivo o texto es correcto.");
                }
            };

            const handleImportFile = (e) => {
                const file = e.target.files[0];
                if(!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        procesarImportacion(importedData);
                    } catch(err) {
                        alert("El archivo seleccionado no es un JSON válido.");
                    }
                };
                reader.readAsText(file);
            };

            const handleRescateSubmit = () => {
                if(!textoRescate.trim()) return;
                try {
                    const importedData = JSON.parse(textoRescate.trim());
                    procesarImportacion(importedData);
                } catch(err) {
                    alert("El texto pegado no es correcto. Por favor, asegúrate de haber copiado todo el texto del recuadro rojo.");
                }
            };

            return (
                <div className="absolute inset-0 z-20 flex flex-col animate-fade-in bg-gray-50">
                    <header className="flex-shrink-0 bg-brand text-white px-6 pt-12 pb-6 shadow-lg rounded-b-[2.5rem] space-y-3">
                        <div className="flex items-center gap-2">
                            <IconBtn icon="arrow_back" onClick={onVolver} className="text-white -ml-2" />
                            <h1 className="text-xl font-bold">Ajustes</h1>
                        </div>
                        <h2 className="text-3xl font-black pt-1">Seguridad</h2>
                        <p className="text-xs text-white/70">Guarda tus datos a salvo o transfiérelos.</p>
                    </header>
                    <main className="flex-1 overflow-y-auto p-6 space-y-4 no-scrollbar pb-32">
                        
                        <div className="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm text-center">
                            <div className="bg-brand-soft text-brand w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4">
                                <span className="material-symbols-outlined text-[32px]">download</span>
                            </div>
                            <h3 className="font-bold text-brand text-lg mb-2">Exportar copia</h3>
                            <p className="text-sm text-gray-500 mb-6">Descarga un archivo seguro con todos tus usuarios y operaciones para guardarlo en tu nube o pasarlo a otro teléfono.</p>
                            <button onClick={handleExport} className="w-full bg-brand text-white font-bold py-4 rounded-xl active:scale-95 transition shadow-md">Descargar archivo .json</button>
                        </div>

                        <div className="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm text-center">
                            <div className="bg-brand-soft text-brand w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4">
                                <span className="material-symbols-outlined text-[32px]">upload</span>
                            </div>
                            <h3 className="font-bold text-brand text-lg mb-2">Restaurar copia</h3>
                            <p className="text-sm text-gray-500 mb-6">Carga un archivo .json de copia de seguridad previo. <b>Atención:</b> Esto reemplazará los datos actuales.</p>
                            <input type="file" ref={fileInputRef} className="hidden" accept=".json,application/json" onChange={handleImportFile} />
                            <button onClick={() => fileInputRef.current.click()} className="w-full bg-white text-brand border border-gray-200 font-bold py-4 rounded-xl active:scale-95 transition">Seleccionar archivo</button>
                        </div>

                        <div className="pt-6 border-t border-gray-200">
                            <button onClick={() => setMostrarRescate(!mostrarRescate)} className="w-full text-red-500 font-bold py-4 flex items-center justify-center gap-2 text-sm bg-red-50 rounded-xl">
                                <span className="material-symbols-outlined text-lg">medical_services</span> Pegar datos de rescate
                            </button>
                            
                            {mostrarRescate && (
                                <div className="mt-4 animate-fade-in space-y-3">
                                    <p className="text-xs text-gray-500 text-center">Pega aquí el texto que copiaste de la pantalla de rescate de tu app antigua.</p>
                                    <textarea 
                                        value={textoRescate} 
                                        onChange={(e) => setTextoRescate(e.target.value)}
                                        className="w-full h-32 p-4 border-2 border-red-200 rounded-xl outline-none focus-ring text-xs text-gray-600 font-mono" 
                                        placeholder='[{"id":"123","nombre":"Eudald"...}]'
                                    ></textarea>
                                    <button onClick={handleRescateSubmit} className="w-full bg-red-500 text-white font-bold py-3 rounded-xl shadow-md active:scale-95 transition">Restaurar ahora</button>
                                </div>
                            )}
                        </div>

                    </main>
                </div>
            );
        };

        const ModalOR = ({ onClose, onGuardar, incentivesConfig, orAEditar, operaciones }) => {
            const [foto, setFoto] = React.useState(null);
            const [numeroOR, setNumeroOR] = React.useState('');
            const [fecha, setFecha] = React.useState(new Date().toISOString().split('T')[0]);
            const [subiendoFoto, setSubiendoFoto] = React.useState(false);
            const [isOR, setIsOR] = React.useState(orAEditar ? orAEditar.tipo !== 'Matrícula' : true);
            const [quantities, setQuantities] = React.useState(incentivesConfig.reduce((acc, inc) => ({...acc, [inc.id]: 0}), {}));

            React.useEffect(() => {
                if (orAEditar) {
                    setNumeroOR(orAEditar.numero); setFecha(orAEditar.fecha); setFoto(orAEditar.foto);
                    if (orAEditar.desglose) { const q = {}; orAEditar.desglose.forEach(d => q[d.idIncentivo] = d.cantidad); setQuantities(prev => ({...prev, ...q})); }
                }
            }, [orAEditar]);
            
            const getPrecioUnitario = (inc, qty) => {
                if (!inc.usarTramos) return inc.pagoBase || 0;
                if (!inc.tramos || inc.tramos.length === 0) return 0;
                
                const mesActual = new Date(fecha).getMonth();
                const añoActual = new Date(fecha).getFullYear();
                let acumulado = 0;
                
                operaciones.forEach(op => {
                    if (orAEditar && op.id === orAEditar.id) return; 
                    const d = new Date(op.fecha);
                    if (d.getMonth() === mesActual && d.getFullYear() === añoActual && op.desglose) {
                        const item = op.desglose.find(d => d.idIncentivo === inc.id);
                        if (item) acumulado += item.cantidad;
                    }
                });

                const totalMes = acumulado + qty;

                const tramosOrdenados = [...inc.tramos].sort((a,b) => parseFloat(b.unidades) - parseFloat(a.unidades));
                const tramoAplicable = tramosOrdenados.find(t => totalMes >= parseFloat(t.unidades));
                return tramoAplicable ? parseFloat(tramoAplicable.pago) : 0;
            };
            
            const totalIncentivo = React.useMemo(() => incentivesConfig.reduce((sum, inc) => { const qty = quantities[inc.id] || 0; return sum + (qty * getPrecioUnitario(inc, qty)); }, 0), [incentivesConfig, quantities, fecha, operaciones]);
            
            const handleAdjuntarFoto = async (e) => { 
                if(e.target.files && e.target.files[0]) { 
                    setSubiendoFoto(true);
                    try { const imgCompressed = await procesarImagen(e.target.files[0], 1000, 0.6); setFoto(imgCompressed); } 
                    catch (error) { alert("Error al procesar la imagen."); } 
                    finally { setSubiendoFoto(false); }
                } 
            };
            
            const handleSubmit = () => { 
                if (!numeroOR || !fecha) { alert("Completa O.R./Matrícula y fecha."); return; } 
                const tipoString = isOR ? 'O.R.' : 'Matrícula';
                const desglose = incentivesConfig.map(inc => { const qty = quantities[inc.id] || 0; return { idIncentivo: inc.id, nombre: inc.nombre, cantidad: qty, totalGenerado: qty * getPrecioUnitario(inc, qty) }; }).filter(item => item.cantidad > 0);
                onGuardar({ id: orAEditar ? orAEditar.id : Date.now(), tipo: tipoString, numero: numeroOR, fecha: fecha, incentivo: totalIncentivo, foto: foto, desglose: desglose }); 
                onClose(); 
            };

            return (
                <div className="absolute inset-0 bg-black/70 z-[150] flex flex-col justify-end animate-fade-in">
                    <div className="bg-white rounded-t-[2.5rem] p-6 h-[90%] flex flex-col shadow-2xl relative">
                        <IconBtn icon="close" onClick={onClose} className="absolute top-4 right-4 text-gray-400" />
                        <h2 className="text-xl font-bold text-brand mb-4 text-center mt-2">{orAEditar ? "Editar Operación" : "Registrar nueva operación"}</h2>
                        
                        <div className="overflow-y-auto pb-10 flex-1 px-1 no-scrollbar space-y-4">
                            
                            <div className="flex bg-gray-100 p-1 rounded-xl mb-2">
                                <button onClick={() => setIsOR(true)} className={`flex-1 py-2.5 text-sm font-bold rounded-lg transition ${isOR ? 'bg-white shadow-sm text-brand' : 'text-gray-400'}`}>O.R.</button>
                                <button onClick={() => setIsOR(false)} className={`flex-1 py-2.5 text-sm font-bold rounded-lg transition ${!isOR ? 'bg-white shadow-sm text-brand' : 'text-gray-400'}`}>Matrícula</button>
                            </div>

                            <input type="text" value={numeroOR} onChange={(e) => setNumeroOR(e.target.value)} placeholder={isOR ? "Número de O.R." : "Número de Matrícula"} className="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus-ring font-bold text-brand" />
