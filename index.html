                if(e.target.files && e.target.files[0]) { setProcesandoFoto(true); try { const imgProcessed = await procesarImagen(e.target.files[0], 500, 0.7); setPerfil({...perfil, foto: imgProcessed}); } catch (error) { alert("Error al cargar la foto."); } finally { setProcesandoFoto(false); } } 
            }; 
            const guardarNombre = () => { if(tempNombre.trim()) { setPerfil({...perfil, nombre: tempNombre.trim()}); } else { setTempNombre(perfil.nombre); } setEditandoNombre(false); }; 
            
            return ( 
                <div className="flex flex-col h-full w-full relative"> 
                    <header className="bg-brand text-white p-8 pt-16 flex flex-col items-center rounded-b-[3rem] shadow-xl relative z-10"> 
                        <IconBtn icon="logout" onClick={onLogout} className="absolute top-6 left-6 text-white" />
                        <div className="relative w-24 h-24 bg-white/10 rounded-full flex items-center justify-center mb-4 shadow-inner cursor-pointer border-2 border-transparent hover:border-white transition-all mt-4" onClick={() => fileInputRef.current.click()}> 
                            {procesandoFoto ? (<div className="w-8 h-8 border-4 border-white/20 border-t-white rounded-full animate-spin"></div>) : perfil.foto ? <img src={perfil.foto} className="w-full h-full object-cover rounded-full" alt="Perfil" /> : <span className="material-symbols-outlined text-5xl text-white/50">person</span>} 
                            <div className="absolute inset-0 bg-black/50 flex flex-col items-center justify-center opacity-0 hover:opacity-100 transition-opacity rounded-full"><span className="material-symbols-outlined text-white">photo_camera</span></div> 
                            <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={handleFotoChange} /> 
                        </div> 
                        {editandoNombre ? <input autoFocus value={tempNombre} onChange={e => setTempNombre(e.target.value)} onBlur={guardarNombre} onKeyDown={e => e.key === 'Enter' && guardarNombre()} className="text-xl font-bold text-center text-brand bg-white rounded-lg px-4 py-2 w-3/4 shadow-inner outline-none" /> : <div className="flex items-center gap-2 cursor-pointer p-2 px-3 rounded-lg active:bg-white/10 transition" onClick={() => setEditandoNombre(true)}><h1 className="text-2xl font-black">{perfil.nombre}</h1><span className="material-symbols-outlined text-sm text-white/50">edit</span></div>} 
                    </header> 
                    <main className="p-4 space-y-3 mt-4 flex-1 overflow-y-auto no-scrollbar pb-[180px] relative z-10">
                        <BotonMenuPerfil icono="trending_up" titulo="Configurador de incentivos" onClick={() => onNavegar('configIncentivos')} />
                        <BotonMenuPerfil icono="description" titulo="Exportar reportes" onClick={() => onNavegar('exportar')} />
                        <BotonMenuPerfil icono="palette" titulo="Personalización" onClick={() => onNavegar('personalizacion')} />
                        <BotonMenuPerfil icono="security" titulo="Copia y Restauración" onClick={() => onNavegar('backup')} />
                    </main> 
                </div> 
            ); 
        };

        const PersonalizacionView = ({ onVolver, perfil, setPerfil }) => {
            return (
                <div className="absolute inset-0 z-20 flex flex-col animate-fade-in bg-brand">
                    <header className="flex-shrink-0 text-white px-6 pt-12 pb-6 relative z-10 shadow-lg rounded-b-[2.5rem] space-y-3">
                        <div className="flex items-center gap-2"><IconBtn icon="arrow_back" onClick={onVolver} className="text-white -ml-2" /><h1 className="text-xl font-bold">Ajustes</h1></div>
                        <h2 className="text-3xl font-black pt-1">Personalización</h2>
                        <p className="text-xs text-white/70">Adapta los colores a tu marca preferida.</p>
                    </header>
                    <main className="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar pb-32 mt-2 relative z-20">
                        <div className="grid grid-cols-2 gap-3">
                            {THEMES.map(theme => {
                                const isSelected = (perfil.themeId || 'default') === theme.id;
                                return (
                                    <div key={theme.id} onClick={() => setPerfil({ themeId: theme.id })} className={`bg-white/10 backdrop-blur-sm rounded-2xl p-4 flex flex-col items-center justify-center gap-3 border-2 cursor-pointer transition active:scale-95 ${isSelected ? 'border-accent shadow-lg bg-white/20' : 'border-transparent'}`}>
                                        <div className="w-14 h-14 flex items-center justify-center p-1">
                                            {theme.id !== 'default' ? (
                                                <img src={getBrandIconUrl(theme)} className="w-full h-full object-contain" />
                                            ) : (
                                                <div className="w-full h-full flex items-center justify-center">
                                                    <img src="logo.png" className="w-full h-full object-contain drop-shadow-md" alt="IncentivAuto" onError={(e) => { e.target.style.display='none'; e.target.nextSibling.style.display='block'; }} />
                                                    <span className="material-symbols-outlined text-[32px] text-white" style={{display: 'none'}}>directions_car</span>
                                                </div>
                                            )}
                                        </div>
                                        <span className={`text-xs font-bold text-center text-white`}>{theme.nombre}</span>
                                    </div>
                                )
                            })}
                        </div>
                    </main>
                </div>
            );
        };

        const TramosDetalleView = ({ inc, onVolver, onSave }) => {
            const [tempNombre, setTempNombre] = React.useState(inc.nombre);
            const [localTramos, setLocalTramos] = React.useState(inc.tramos.map(t => ({...t, unidades: t.unidades.toString(), pago: t.pago.toString()})) || []);
            const [tempPagoBase, setTempPagoBase] = React.useState(inc.pagoBase === 0 ? '' : inc.pagoBase.toString());
            const [usarTramos, setUsarTramos] = React.useState(inc.usarTramos);

            const handleUpdateTramo = (id, field, value) => { setLocalTramos(localTramos.map(t => t.id === id ? {...t, [field]: value} : t)); };
            const handleAñadirTramo = () => { const ultimoTramo = localTramos[localTramos.length - 1]; const nuevasUnidades = ultimoTramo ? (parseFloat(ultimoTramo.unidades) || 0) + 5 : 1; const nuevoPago = ultimoTramo ? (parseFloat(ultimoTramo.pago) || 0) + 1 : 1; setLocalTramos([...localTramos, { id: Date.now(), unidades: nuevasUnidades.toString(), pago: nuevoPago.toString() }]); };

            const handleGuardarTotal = () => {
                const pb = parseFloat(tempPagoBase);
                const processedTramos = localTramos.map(t => ({ ...t, unidades: parseInt(t.unidades, 10) || 0, pago: parseFloat(t.pago) || 0 })).sort((a,b) => a.unidades - b.unidades);
                onSave(inc.id, { nombre: tempNombre || "Nuevo incentivo", tramos: processedTramos, pagoBase: isNaN(pb) ? 0 : pb, usarTramos: usarTramos });
                onVolver();
            };

            const baseCardStyle = "rounded-3xl p-5 border-2 cursor-pointer transition-all space-y-4";
            const selectedStyle = "border-accent bg-white shadow-md";
            const unselectedStyle = "border-transparent bg-white/60 opacity-70";

            return (
                <div className="absolute inset-0 z-20 flex flex-col animate-fade-in bg-gray-50">
                    <header className="flex-shrink-0 bg-brand text-white px-4 pt-12 pb-6 shadow-lg rounded-b-[2.5rem] flex items-center gap-2">
                        <IconBtn icon="arrow_back" onClick={onVolver} className="text-white -ml-2" />
                        <input type="text" value={tempNombre} onChange={(e) => setTempNombre(e.target.value)} className="w-full bg-transparent text-xl font-bold outline-none border-b border-white/20 focus:border-white pb-1" placeholder="Nombre" />
                    </header>
                    <main className="flex-1 overflow-y-auto p-4 pb-[180px] space-y-4 no-scrollbar">
                        <div onClick={() => setUsarTramos(false)} className={`${baseCardStyle} ${!usarTramos ? selectedStyle : unselectedStyle}`}>
                            <div className="flex justify-between items-center"><div className="flex items-center gap-3"><h3 className="font-bold text-brand uppercase text-xs">Pago fijo</h3>{!usarTramos && <span className="material-symbols-outlined text-accent">check_circle</span>}</div><div className={`font-black text-2xl ${!usarTramos ? 'text-accent' : 'text-gray-400'}`}>{tempPagoBase === '' ? '0,00' : parseFloat(tempPagoBase || 0).toFixed(2).replace('.', ',')} €</div></div>
                            <input type="number" step="0.5" value={tempPagoBase} onChange={e => !usarTramos && setTempPagoBase(e.target.value)} className="w-full p-4 border rounded-xl font-bold border-gray-200 outline-none mt-2" placeholder="0.00" disabled={usarTramos} />
                        </div>
                        <div onClick={() => setUsarTramos(true)} className={`${baseCardStyle} ${usarTramos ? selectedStyle : unselectedStyle}`}>
                            <div className="flex justify-between items-center"><div className="flex items-center gap-3"><div><h3 className="font-bold text-brand uppercase text-xs">Tramos (Escalado)</h3></div>{usarTramos && <span className="material-symbols-outlined text-accent">check_circle</span>}</div></div>
                            <div className={usarTramos ? 'mt-4' : 'opacity-40 pointer-events-none mt-4'}>
                                {localTramos.sort((a,b) => (parseFloat(a.unidades)||0) - (parseFloat(b.unidades)||0)).map(tramo => (
                                    <div key={tramo.id} className="flex gap-2 mb-3 bg-gray-50 p-3 rounded-2xl border border-gray-100 relative items-end">
                                        <div className="flex-1"><label className="text-[10px] font-bold text-gray-400 uppercase ml-1">Uds (≥)</label><input type="number" step="1" value={tramo.unidades} onChange={e => handleUpdateTramo(tramo.id, 'unidades', e.target.value)} className="w-full bg-white border border-gray-200 rounded-xl p-3 text-center font-black focus-ring mt-1" /></div>
                                        <div className="flex-1"><label className="text-[10px] font-bold text-gray-400 uppercase ml-1">Pago /ud</label><input type="number" step="0.1" value={tramo.pago} onChange={e => handleUpdateTramo(tramo.id, 'pago', e.target.value)} className="w-full border border-gray-200 bg-white rounded-xl p-3 font-black focus-ring text-accent mt-1 pl-4" /></div>
                                        {usarTramos && <button onClick={() => setLocalTramos(localTramos.filter(t => t.id !== tramo.id))} className="absolute -top-2 -right-2 text-red-500 bg-white shadow-md rounded-full p-1"><span className="material-symbols-outlined text-[16px]">close</span></button>}
                                    </div>
                                ))}
                                {usarTramos && ( <button onClick={handleAñadirTramo} className="w-full border-2 border-dashed border-gray-300 rounded-2xl p-4 text-gray-500 font-bold hover:text-accent transition flex items-center justify-center gap-2 mt-4 bg-white/50"><span className="material-symbols-outlined">add_circle</span> Añadir tramo</button> )}
                            </div>
                        </div>
                    </main>
                    <div className="absolute bottom-20 left-0 right-0 p-6 z-30 flex justify-center"><button onClick={handleGuardarTotal} className="w-full bg-brand text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition">Guardar cambios</button></div>
                </div>
            );
        };

        const ConfiguradorIncentivosView = ({ onVolver, incentives, onUpdateIncentive, onCreateIncentive, onDeleteIncentive }) => {
            const [selectedIncentive, setSelectedIncentive] = React.useState(null);
            if (selectedIncentive) return <TramosDetalleView inc={selectedIncentive} onVolver={() => setSelectedIncentive(null)} onSave={onUpdateIncentive} />;
            return (
                <div className="absolute inset-0 bg-transparent z-20 flex flex-col animate-fade-in">
                    <header className="flex-shrink-0 bg-brand text-white px-6 pt-12 pb-6 shadow-lg rounded-b-[2.5rem] space-y-3"><div className="flex items-center gap-2"><IconBtn icon="arrow_back" onClick={onVolver} className="text-white -ml-2" /><h1 className="text-xl font-bold">Ajustes</h1></div><h2 className="text-3xl font-black pt-1">Incentivos</h2><p className="text-xs text-white/70 font-medium">Configura los productos y reglas de comisión.</p></header>
                    <main className="flex-1 overflow-y-auto p-4 space-y-3 no-scrollbar pb-32 mt-2">
                        {incentives.map(inc => (
                            <div key={inc.id} className="bg-white rounded-[1.5rem] p-5 flex items-center justify-between border border-gray-100 shadow-sm cursor-pointer active:scale-95 transition" onClick={() => setSelectedIncentive(inc)}>
                                <div className="flex items-center gap-4"><div className="p-3 rounded-2xl bg-gray-50 text-accent"><span className="material-symbols-outlined text-xl">{inc.icono || 'inventory_2'}</span></div><div><h3 className="font-bold text-brand text-lg">{inc.nombre}</h3><p className="text-[11px] font-bold text-gray-400 mt-0.5 uppercase tracking-wider">{inc.usarTramos ? `${inc.tramos.length} tramos` : 'Pago fijo'}</p></div></div>
                                <div className="flex items-center gap-1"><button onClick={(e) => { e.stopPropagation(); if(window.confirm('¿Borrar?')) onDeleteIncentive(inc.id); }} className="text-gray-300 p-2 hover:text-red-500"><span className="material-symbols-outlined">delete</span></button><span className="material-symbols-outlined text-gray-300 text-3xl">chevron_right</span></div>
                            </div>
                        ))}
                        <button onClick={onCreateIncentive} className="w-full border-2 border-dashed border-gray-300 rounded-[1.5rem] p-5 text-gray-500 font-bold bg-white/50 flex items-center justify-center gap-2 mt-4"><span className="material-symbols-outlined">add_circle</span> Crear incentivo</button>
                    </main>
                </div>
            );
        };

        const GraficoBarrasPDF = ({ datos }) => {
            const maxValor = Math.max(...datos.map(d => d.valor), 1);
            return (
                <div className="w-full mt-6 bg-gray-50 p-6 rounded-3xl border border-gray-100">
                    <h4 className="text-xs font-bold text-gray-400 uppercase mb-5 tracking-wide text-center">Evolución anual</h4>
                    <div className="w-full h-48 flex items-end justify-between gap-1 border-b border-gray-200 pb-2 relative">
                        <div className="absolute left-0 right-0 top-0 h-px bg-gray-100"></div><div className="absolute left-0 right-0 top-1/2 h-px bg-gray-100"></div>
                        {datos.map((mes, index) => {
                            const alturaPorcentaje = (mes.valor / maxValor) * 100;
                            return (
                                <div key={index} className="flex-1 flex flex-col items-center group h-full justify-end relative z-10">
                                    {mes.valor > 0 && <div className="mb-1 text-[8px] font-black text-brand bg-white px-1 py-0.5 rounded shadow-sm">{formatoEuro(mes.valor).replace(',00 €', '')}</div>}
                                    <div className="w-full max-w-[15px] rounded-t bg-brand" style={{ height: `${Math.max(alturaPorcentaje, 1)}%` }}></div>
                                    <div className="mt-2 text-[9px] font-bold text-gray-400 uppercase tracking-tighter">{mes.mes.substring(0, 3)}</div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const ExportarReportesView = ({ onVolver, operaciones, perfil }) => {
            const [generandoPDF, setGenerandoPDF] = React.useState(false);
            const printableRef = React.useRef(null);
            const [dataImpresion, setDataImpresion] = React.useState(null);

            const añosDisponibles = React.useMemo(() => {
                const años = operaciones.map(op => new Date(op.fecha).getFullYear());
                const unicos = [...new Set(años)].sort((a, b) => b - a);
                return unicos.length > 0 ? unicos : [new Date().getFullYear()];
            }, [operaciones]);

            const [añoFiltro, setAñoFiltro] = React.useState(añosDisponibles[0]);
            React.useEffect(() => { if (añosDisponibles.length > 0 && !añosDisponibles.includes(añoFiltro)) { setAñoFiltro(añosDisponibles[0]); } }, [añosDisponibles, añoFiltro]);

            const mesesAgrupados = React.useMemo(() => {
                const grupos = {};
                operaciones.filter(op => new Date(op.fecha).getFullYear() === añoFiltro).forEach(op => {
                    const mesIdx = new Date(op.fecha).getMonth();
                    if (!grupos[mesIdx]) { grupos[mesIdx] = { mes: mesIdx, titulo: mesesNombres[mesIdx], totalORs: 0, totalIncentivo: 0 }; }
                    grupos[mesIdx].totalORs += 1;
                    grupos[mesIdx].totalIncentivo += op.incentivo;
                });
                return Object.values(grupos).sort((a, b) => b.mes - a.mes);
            }, [operaciones, añoFiltro]);

            const generarPDF = async (tipo, nombreArchivo, callback) => {
                const element = printableRef.current;
                const opt = { margin: [10, 10, 10, 10], filename: nombreArchivo, image: { type: 'jpeg', quality: 0.98 }, html2canvas:  { scale: 2, useCORS: true, scrollX: 0, scrollY: 0 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
                try { await html2pdf().set(opt).from(element).save(); } catch (error) { alert("Error generando PDF."); } finally { if (callback) callback(); }
            };

            const handleDescargaAnual = () => {
                setGenerandoPDF(true);
                const datosGraficoAnual = mesesNombres.map((nombreMes, index) => {
                    const totalIngresosMes = operaciones.filter(op => { const date = new Date(op.fecha); return date.getFullYear() === añoFiltro && date.getMonth() === index; }).reduce((sum, op) => sum + op.incentivo, 0);
                    return { mes: nombreMes, valor: totalIngresosMes };
                });
                const totalAnual = datosGraficoAnual.reduce((sum, d) => sum + d.valor, 0);
                setDataImpresion({ tipo: 'Anual', titulo: `Reporte anual ${añoFiltro}`, total: formatoEuro(totalAnual), graficoData: datosGraficoAnual });
                setTimeout(() => { generarPDF('Anual', `Reporte_Anual_${añoFiltro}.pdf`, () => { setGenerandoPDF(false); setDataImpresion(null); }); }, 100);
            };

            const handleDescargaMensual = (mesData) => {
                setGenerandoPDF(true);
                const opsDetalladas = operaciones.filter(op => { const date = new Date(op.fecha); return date.getFullYear() === añoFiltro && date.getMonth() === mesData.mes; });
                const resumenProd = {};
                opsDetalladas.forEach(op => { if (op.desglose) { op.desglose.forEach(item => { if (!resumenProd[item.nombre]) { resumenProd[item.nombre] = { unidades: 0, total: 0 }; } resumenProd[item.nombre].unidades += item.cantidad; resumenProd[item.nombre].total += item.totalGenerado; }); } });
                const arrayResumenProd = Object.keys(resumenProd).map(key => ({ nombre: key, unidades: resumenProd[key].unidades, total: resumenProd[key].total })).sort((a,b) => b.unidades - a.unidades);
                setDataImpresion({ tipo: 'Mensual', titulo: `Reporte: ${mesData.titulo} ${añoFiltro}`, total: formatoEuro(mesData.totalIncentivo), opsTable: opsDetalladas, resumenProductos: arrayResumenProd });
                setTimeout(() => { generarPDF('Mensual', `Reporte_${mesData.titulo}_${añoFiltro}.pdf`, () => { setGenerandoPDF(false); setDataImpresion(null); }); }, 100);
            };

            return (
                <div className="absolute inset-0 z-20 flex flex-col animate-fade-in bg-transparent">
                    {generandoPDF && ( <div className="absolute inset-0 bg-black/80 z-[200] flex flex-col items-center justify-center space-y-4 animate-fade-in text-white p-10 text-center"><div className="w-12 h-12 border-4 border-white/20 border-t-white rounded-full animate-spin"></div><p className="font-extrabold text-xl">Generando PDF...</p></div> )}
                    <header className="flex-shrink-0 bg-brand text-white px-6 pt-12 pb-10 relative z-10 shadow-lg rounded-b-[2.5rem] space-y-3"><div className="flex items-center gap-2"><IconBtn icon="arrow_back" onClick={onVolver} className="text-white -ml-2" /><h1 className="text-xl font-bold">Ajustes</h1></div><h2 className="text-3xl font-extrabold pt-1">Exportar reportes</h2></header>
                    <main className="flex-1 flex flex-col overflow-hidden relative z-20 -mt-5">
                        <div className="flex-shrink-0 px-6 py-1 flex gap-3 overflow-x-auto no-scrollbar"><div className="flex gap-3 pb-3 pt-1">{añosDisponibles.map(año => ( <button key={año} onClick={() => setAñoFiltro(año)} className={`px-5 py-2.5 rounded-full text-sm font-bold transition-all shadow-md flex-shrink-0 ${añoFiltro === año ? 'bg-brand text-white' : 'bg-white text-gray-500 border border-gray-100'}`}>{año}</button> ))}</div></div>
                        <div className="flex-1 overflow-y-auto p-4 pt-6 pb-[180px] no-scrollbar space-y-3 h-full">
                            {mesesAgrupados.length === 0 ? ( <div className="flex flex-col items-center justify-center text-gray-400 mt-16"><span className="material-symbols-outlined text-6xl mb-4 text-gray-300">description</span><p className="text-sm font-bold">No hay operaciones.</p></div> ) : ( mesesAgrupados.map(mes => ( <div key={mes.mes} className="bg-white/90 backdrop-blur-sm rounded-[2rem] p-6 shadow-sm border border-white flex items-center justify-between"><div><h3 className="font-bold text-brand text-lg">{mes.titulo} {añoFiltro}</h3><p className="text-xs text-gray-400 mt-1 font-bold">{mes.totalORs} O.R. cerradas • <span className="text-accent">{formatoEuro(mes.totalIncentivo)}</span></p></div><button onClick={() => handleDescargaMensual(mes)} className="text-accent bg-white p-4 rounded-xl shadow-sm active:scale-90 transition"><span className="material-symbols-outlined">download</span></button></div> )) )}
                        </div>
                    </main>
                    <div className="absolute bottom-24 left-0 right-0 p-6 z-30 flex justify-center"><button onClick={handleDescargaAnual} className="w-full bg-brand text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition flex items-center justify-center gap-2"><span className="material-symbols-outlined text-[24px]">picture_as_pdf</span> Descargar Anual</button></div>

                    <div style={{ position: 'fixed', top: 0, left: 0, zIndex: -9999, opacity: 0.001, pointerEvents: 'none' }}>
                        <div ref={printableRef} className="pdf-content bg-white p-8 text-brand antialiased" style={{ width: '718px', maxWidth: '718px', minWidth: '718px' }}>
                            <header className="flex justify-between items-center pb-6 border-b border-gray-100 mb-8 page-header"><div className="flex items-center gap-3"><div className="bg-brand text-white rounded-full w-12 h-12 flex items-center justify-center font-black text-xl shadow-lg">I</div><div className="flex flex-col"><h1 className="text-2xl font-black text-brand">IncentivAuto</h1><p className="text-[10px] text-gray-400 uppercase font-bold tracking-wider">Reporte de operaciones premium</p></div></div><div className="text-right"><p className="text-[10px] text-gray-400">Generado el: {new Date().toLocaleDateString('es-ES')}</p><p className="text-[10px] font-bold text-gray-500 mt-1 uppercase">Usuario: {perfil.nombre}</p></div></header>
                            {dataImpresion && ( <main className="space-y-10"><div className="flex justify-between items-end gap-10"><div><h2 className="text-4xl font-extrabold text-brand">{dataImpresion.titulo}</h2><p className="text-gray-400 mt-1 text-sm">Resumen financiero detallado de las operaciones gestionadas en la aplicación.</p></div><div className="bg-brand text-white p-6 rounded-[2rem] w-64 text-right shadow-lg"><p className="text-[10px] font-bold uppercase mb-1 opacity-80">INGRESOS TOTALES</p><p className="text-4xl font-black text-accent">{dataImpresion.total}</p></div></div>{dataImpresion.tipo === 'Anual' && dataImpresion.graficoData && ( <div className="space-y-6"><h3 className="font-extrabold text-brand text-xl border-b pb-2">Gráfico de evolución mensual</h3><GraficoBarrasPDF datos={dataImpresion.graficoData} /></div> )}{dataImpresion.tipo === 'Mensual' && ( <div className="space-y-8"><div className="grid grid-cols-2 gap-4"><div className="bg-white p-6 rounded-2xl border border-gray-100 flex items-center gap-4 shadow-sm"><div className="bg-gray-50 text-accent p-3 rounded-xl"><span className="material-symbols-outlined text-xl">receipt_long</span></div><div><p className="text-[10px] text-gray-400 font-bold uppercase mb-0.5">Total O.R.</p><p className="text-3xl font-black text-brand">{dataImpresion.opsTable.length}</p></div></div><div className="bg-white p-6 rounded-2xl border border-gray-100 flex items-center gap-4 shadow-sm"><div className="bg-gray-50 text-brand p-3 rounded-xl"><span className="material-symbols-outlined text-xl">build</span></div><div><p className="text-[10px] text-gray-400 font-bold uppercase mb-0.5">Ingreso medio / O.R.</p><p className="text-3xl font-black text-accent">{formatoEuro(dataImpresion.opsTable.reduce((sum,o)=>sum+o.incentivo,0) / Math.max(dataImpresion.opsTable.length, 1)).replace(',00 €', '')}</p></div></div></div>{dataImpresion.resumenProductos && dataImpresion.resumenProductos.length > 0 && ( <div className="space-y-4"><h3 className="font-extrabold text-brand text-xl border-b pb-2">Resumen de productos vendidos</h3><table className="w-full text-left text-sm border-collapse"><thead><tr className="bg-brand text-white"><th className="p-3 rounded-tl-lg font-bold">Producto</th><th className="p-3 font-bold text-center">Unidades vendidas</th><th className="p-3 rounded-tr-lg font-bold text-right">Incentivo generado</th></tr></thead><tbody>{dataImpresion.resumenProductos.map((prod, idx) => ( <tr key={idx} className="border-b border-gray-100"><td className="p-3 text-brand font-medium">{prod.nombre}</td><td className="p-3 text-center text-gray-600">{prod.unidades}</td><td className="p-3 text-right font-bold text-accent">{formatoEuro(prod.total)}</td></tr> ))}</tbody></table></div> )}<div className="space-y-4 detailed-table"><h3 className="font-extrabold text-brand text-xl border-b pb-2">Detalles diarios por O.R.</h3><table className="w-full text-left text-sm border-collapse"><thead><tr className="bg-brand text-white"><th className="p-3 rounded-tl-lg font-bold w-1/5">Fecha</th><th className="p-3 font-bold w-1/5">Núm. O.R.</th><th className="p-3 font-bold w-2/5">Productos incluidos</th><th className="p-3 rounded-tr-lg font-bold text-right w-1/5">Total incentivo</th></tr></thead><tbody>{dataImpresion.opsTable.sort((a,b)=> new Date(b.fecha) - new Date(a.fecha)).map((op, idx) => ( <tr key={idx} className="border-b border-gray-100 align-top"><td className="p-3 text-gray-500 font-medium">{new Date(op.fecha).toLocaleDateString('es-ES', {day: 'numeric', month: 'short', year: 'numeric'})}</td><td className="p-3 text-brand font-black">{op.numero}</td><td className="p-3 text-gray-600 text-xs">{op.desglose && op.desglose.length > 0 ? ( <ul className="space-y-1">{op.desglose.map((item, i) => ( <li key={i}><span className="font-bold text-gray-800">{item.nombre}:</span> {item.cantidad} uds.</li> ))}</ul> ) : ( <span className="italic text-gray-400">Detalle no disponible</span> )}</td><td className="p-3 text-right font-black text-accent">{formatoEuro(op.incentivo)}</td></tr> ))}</tbody></table></div></div> )}</main> )}
                            <footer className="mt-16 pt-6 border-t border-gray-100 text-center text-gray-400 text-[10px] page-footer"><p>© {new Date().getFullYear()} IncentivAuto Pro - Gestión premium de incentivos taller.</p><p>Reporte generado por {perfil.nombre}. Documento de uso interno y confidencial.</p></footer>
                        </div>
                    </div>
                </div>
            );
        };

        const PanelNotificaciones = ({ notificaciones, onClose, marcarLeidas, onDeleteNotif }) => {
            React.useEffect(() => { marcarLeidas(); }, []);
            return (
                <div className="absolute inset-0 bg-black/70 z-[150] flex flex-col justify-end animate-fade-in">
                    <div className="bg-gray-50 rounded-t-[2.5rem] h-[85%] flex flex-col shadow-2xl relative">
                        <div className="bg-white p-6 pb-4 border-b border-gray-100 relative z-20 shadow-sm"><IconBtn icon="close" onClick={onClose} className="absolute top-4 right-4 text-gray-400" /><h2 className="text-2xl font-black text-brand">Notificaciones</h2></div>
                        <div className="overflow-y-auto flex-1 p-4 no-scrollbar space-y-3 pb-20 bg-transparent">
                            {notificaciones.length === 0 ? ( <div className="flex flex-col items-center justify-center text-gray-400 mt-16"><span className="material-symbols-outlined text-6xl mb-4 text-gray-300">notifications_off</span><p className="text-sm font-bold">Sin notificaciones.</p></div> ) : ( notificaciones.map(n => ( <div key={n.id} className={`relative p-5 rounded-2xl border ${n.leida ? 'bg-white border-gray-100' : 'bg-white border-accent shadow-md'} flex gap-4 transition`}>
                                        <button onClick={() => onDeleteNotif(n.id)} className="absolute top-4 right-4 text-gray-300 hover:text-red-500"><span className="material-symbols-outlined text-[20px]">close</span></button>
                                        <div className={`mt-1 ${n.leida ? 'text-gray-300' : 'text-accent'}`}><span className="material-symbols-outlined text-[32px]">{n.leida ? 'notifications' : 'celebration'}</span></div><div className="pr-6"><p className={`text-sm ${n.leida ? 'text-gray-500' : 'font-bold text-brand'}`}>{n.mensaje}</p><p className="text-[10px] text-gray-400 mt-2 font-bold uppercase">{new Date(n.fecha).toLocaleDateString('es-ES', {month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit'})}</p></div></div> )) )}
                        </div>
                    </div>
                </div>
            );
        };

        const PanelCrearPerfil = ({ onCrearNuevo, onCerrar }) => {
            const [nombre, setNombre] = React.useState('');
            return (
                <div className="absolute inset-0 bg-black/90 z-[200] flex flex-col justify-center p-6 animate-fade-in">
                    <div className="bg-white rounded-[2.5rem] p-8 w-full shadow-2xl relative">
                        <IconBtn icon="close" onClick={onCerrar} className="absolute top-4 right-4 text-gray-400" />
                        <h2 className="text-2xl font-black text-brand mb-6">Nuevo perfil</h2>
                        <input autoFocus type="text" value={nombre} onChange={(e) => setNombre(e.target.value)} placeholder="Nombre del usuario" className="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none font-bold text-brand mb-6" />
                        <button onClick={() => { if(!nombre.trim()) return; onCrearNuevo({ id: Date.now().toString(), nombre: nombre.trim(), foto: null, themeId: 'default', operaciones: [], notificaciones: [], incentives: [ { id: 'tires', nombre: 'Neumáticos', icono: 'build', pagoBase: 0, usarTramos: true, tramos: [ { id: 1, unidades: 1, pago: 4.00 }, { id: 2, unidades: 10, pago: 6.00 } ] } ] }); onCerrar(); }} className="w-full bg-brand text-white font-black py-4 rounded-2xl active:scale-95 transition">Crear perfil</button>
                    </div>
                </div>
            );
        };

        const SeleccionPerfilView = ({ perfiles, onSeleccionar, onCrearNuevo, onEliminarPerfil, activeTheme }) => {
            const [modoCrear, setModoCrear] = React.useState(false);
            const [modoGestion, setModoGestion] = React.useState(false);

            return (
                <div className="absolute inset-0 text-white z-[100] flex flex-col animate-fade-in p-6" style={{ backgroundColor: activeTheme.brand }}>
                    <header className="flex flex-col items-center pt-20 pb-8 flex-shrink-0 relative z-10">
                        <div className="w-40 h-40 flex items-center justify-center mb-6 flex-shrink-0">
                            {activeTheme.id !== 'default' ? (
                                <img src={getBrandIconUrl(activeTheme, '#ffffff')} className="w-full h-full object-contain drop-shadow-2xl" />
                            ) : ( 
                                <React.Fragment>
                                    <img src="logo.png" className="w-full h-full object-contain drop-shadow-2xl" alt="Logo" onError={(e) => { e.target.style.display='none'; e.target.nextSibling.style.display='block'; }} /> 
                                    <span className="material-symbols-outlined text-[64px] text-white" style={{display: 'none'}}>directions_car</span>
                                </React.Fragment>
                            )}
                        </div>
                        <h1 className="text-4xl font-black tracking-tight text-white shadow-text">IncentivAuto</h1>
                        <p className="text-white/60 mt-2 font-bold text-sm uppercase tracking-wider">Gestión de incentivos</p>
                    </header>
                    <main className="flex-1 flex flex-col justify-center items-center h-full relative z-10">
                        {modoGestion && <p className="text-center text-red-400 font-bold mb-4 animate-pulse">Toca un perfil para eliminarlo</p>}
                        <div className="w-full overflow-x-auto no-scrollbar py-6">
                            <div className="flex gap-6 px-4 justify-center items-start min-w-max mx-auto h-full">
                                {perfiles.map(p => (
                                    <div key={p.id} onClick={() => modoGestion ? (window.confirm("¿Eliminar perfil?") && onEliminarPerfil(p.id)) : onSeleccionar(p.id)} className="flex flex-col items-center gap-3 cursor-pointer group active:scale-95 transition">
                                        <div className="w-28 h-28 rounded-full border-4 border-white/20 p-1 group-hover:border-white transition-colors shadow-lg overflow-hidden flex items-center justify-center bg-white/10 relative">
                                            {p.foto ? <img src={p.foto} className="w-full h-full object-cover rounded-full" /> : <span className="material-symbols-outlined text-6xl text-white/50">person</span>}
                                            {modoGestion && <div className="absolute inset-0 bg-red-600/80 flex items-center justify-center rounded-full"><span className="material-symbols-outlined text-white text-4xl">close</span></div>}
                                        </div>
                                        <span className="text-center font-bold text-white text-lg truncate w-28">{p.nombre}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>
                    <footer className="mt-auto pb-10 flex flex-col items-center gap-4 flex-shrink-0 relative z-10">
                        {modoGestion ? (
                            <button onClick={() => setModoGestion(false)} className="bg-white/20 text-white font-bold py-4 px-8 rounded-2xl active:scale-95 transition">Cancelar gestión</button>
                        ) : (
                            <React.Fragment>
                                <button onClick={() => setModoCrear(true)} className="bg-white/10 text-white font-bold py-4 px-8 rounded-2xl border border-white/20 active:scale-95 transition flex items-center gap-2"><span className="material-symbols-outlined text-lg">add_circle</span> Crear nuevo perfil</button>
                                {perfiles.length > 0 && <button onClick={() => setModoGestion(true)} className="text-sm text-white/50 hover:text-white font-bold mt-2 p-2">Gestionar perfiles</button>}
                            </React.Fragment>
                        )}
                    </footer>
                    {modoCrear && <PanelCrearPerfil onCrearNuevo={(np) => { onCrearNuevo(np); setModoCrear(false); }} onCerrar={() => setModoCrear(false)} />}
                </div>
            );
        };

        const App = () => {
            const [perfiles, setPerfiles] = React.useState(() => { try { return JSON.parse(localStorage.getItem('inc_v22_p')) || []; } catch(e) { return []; } });
            const [activeId, setActiveId] = React.useState(null); 
            const [vista, setVista] = React.useState('inicio');
            const [modalOR, setModalOR] = React.useState(false);
            const [searchOpen, setSearchOpen] = React.useState(false);
            const [orAEditar, setOrAEditar] = React.useState(null);
            const [toasts, setToasts] = React.useState([]);

            React.useEffect(() => localStorage.setItem('inc_v22_p', JSON.stringify(perfiles)), [perfiles]);

            const profile = perfiles.find(p => p.id === activeId);
            const lastThemeId = localStorage.getItem('inc_v22_lt') || 'default';
            const theme = THEMES.find(t => t.id === (profile?.themeId || lastThemeId)) || THEMES[0];
            const bgAppColor = theme.id === 'default' ? '#f8fafc' : generateTint(theme.brand, 0.96);

            const updateProfile = (changes) => {
                setPerfiles(prev => prev.map(p => p.id === activeId ? {...p, ...changes} : p));
                if (changes.themeId) localStorage.setItem('inc_v22_lt', changes.themeId);
            };

            const addToast = (msg) => {
                const id = Math.random();
                setToasts(prev => [...prev, {id, msg}]);
                setTimeout(() => setToasts(curr => curr.filter(t => t.id !== id)), 5000);
            };

            const cerrarToast = (id) => {
                setToasts(curr => curr.filter(t => t.id !== id));
            };

            const recalcularOperaciones = (ops, fechaObjetivo) => {
                const mesObj = new Date(fechaObjetivo).getMonth();
                const añoObj = new Date(fechaObjetivo).getFullYear();
                
                const totalesMes = {};
                ops.forEach(op => {
                    const d = new Date(op.fecha);
                    if (d.getMonth() === mesObj && d.getFullYear() === añoObj && op.desglose) {
                        op.desglose.forEach(item => {
                            totalesMes[item.idIncentivo] = (totalesMes[item.idIncentivo] || 0) + item.cantidad;
                        });
                    }
                });

                const preciosMes = {};
                (profile?.incentives || []).forEach(inc => {
                    const qtyTotal = totalesMes[inc.id] || 0;
                    let precio = inc.pagoBase || 0;
                    if (inc.usarTramos && inc.tramos && inc.tramos.length > 0) {
                        const tramosOrdenados = [...inc.tramos].sort((a,b) => parseFloat(b.unidades) - parseFloat(a.unidades));
                        const tramoAplicable = tramosOrdenados.find(t => qtyTotal >= parseFloat(t.unidades));
                        if (tramoAplicable) precio = parseFloat(tramoAplicable.pago);
                    }
                    preciosMes[inc.id] = precio;
                });

                return ops.map(op => {
                    const d = new Date(op.fecha);
                    if (d.getMonth() === mesObj && d.getFullYear() === añoObj && op.desglose) {
                        let nuevoIncentivoTotal = 0;
                        const nuevoDesglose = op.desglose.map(item => {
                            const precioActual = preciosMes[item.idIncentivo] !== undefined ? preciosMes[item.idIncentivo] : 0;
                            const totalItem = item.cantidad * precioActual;
                            nuevoIncentivoTotal += totalItem;
                            return { ...item, totalGenerado: totalItem };
                        });
                        return { ...op, desglose: nuevoDesglose, incentivo: nuevoIncentivoTotal };
                    }
                    return op;
                });
            };

            const handleGuardarOR = (datosOR) => { 
                const safeOps = profile?.operaciones || [];
                const isEditing = safeOps.some(op => op.id === datosOR.id);
                let nuevasOps = isEditing ? safeOps.map(op => op.id === datosOR.id ? datosOR : op) : [...safeOps, datosOR];
                
                nuevasOps = recalcularOperaciones(nuevasOps, datosOR.fecha);
                
                const profileChanges = { operaciones: nuevasOps };
                const pendingToasts = [];

                if (!isEditing) {
                    const fechaOR = new Date(datosOR.fecha);
                    const mesOR = fechaOR.getMonth();
                    const añoOR = fechaOR.getFullYear();

                    const totalesPrevios = {};
                    safeOps.forEach(op => {
                        const d = new Date(op.fecha);
                        if (d.getMonth() === mesOR && d.getFullYear() === añoOR && op.desglose) {
                            op.desglose.forEach(item => {
                                totalesPrevios[item.idIncentivo] = (totalesPrevios[item.idIncentivo] || 0) + item.cantidad;
                            });
                        }
                    });

                    const totalesNuevos = {};
                    nuevasOps.forEach(op => {
                        const d = new Date(op.fecha);
                        if (d.getMonth() === mesOR && d.getFullYear() === añoOR && op.desglose) {
                            op.desglose.forEach(item => {
                                totalesNuevos[item.idIncentivo] = (totalesNuevos[item.idIncentivo] || 0) + item.cantidad;
                            });
                        }
                    });

                    let nuevasNotif = [];
                    (profile?.incentives || []).forEach(inc => {
                        if (inc.usarTramos && inc.tramos && inc.tramos.length > 0) {
                            const prevQty = totalesPrevios[inc.id] || 0; 
                            const newQty = totalesNuevos[inc.id] || 0; 
                            const tramosAsc = [...inc.tramos].sort((a,b) => parseFloat(a.unidades) - parseFloat(b.unidades));
                            tramosAsc.forEach(tramo => { 
                                const metas = parseFloat(tramo.unidades);
                                if (prevQty < metas && newQty >= metas) { 
                                    nuevasNotif.push({ id: Date.now() + Math.random(), mensaje: `¡Felicidades! Has alcanzado el tramo de ${tramo.unidades} uds. en ${inc.nombre}. Nuevo incentivo: ${formatoEuro(parseFloat(tramo.pago))}/ud.`, leida: false, fecha: new Date().toISOString() }); 
                                } 
                            });
                        }
                    });

                    if (nuevasNotif.length > 0) {
                        profileChanges.notificaciones = [...nuevasNotif, ...(profile.notificaciones || [])];
                        nuevasNotif.forEach(n => pendingToasts.push(n.mensaje));
                    }
                }
                
                updateProfile(profileChanges);
                pendingToasts.push(isEditing ? 'Cambios guardados' : `${datosOR.tipo || 'O.R.'} ${datosOR.numero} registrada`);
                pendingToasts.forEach(msg => addToast(msg));
                setOrAEditar(null);
            };

            const handleBorrarOR = (id) => {
                const opToDelete = (profile?.operaciones || []).find(o => o.id === id);
                if (!opToDelete) return;
                let nuevasOps = (profile?.operaciones || []).filter(o => o.id !== id);
                nuevasOps = recalcularOperaciones(nuevasOps, opToDelete.fecha);
                updateProfile({operaciones: nuevasOps});
                addToast('Operación eliminada');
            };

            if (!profile) return <SeleccionPerfilView perfiles={perfiles} onSeleccionar={(id) => { setActiveId(id); setVista('inicio'); localStorage.setItem('inc_v22_lt', perfiles.find(p=>p.id===id)?.themeId || 'default'); }} onCrearNuevo={(np) => { setPerfiles([...perfiles, np]); setActiveId(np.id); setVista('inicio'); }} onEliminarPerfil={(id) => setPerfiles(perfiles.filter(p => p.id !== id))} activeTheme={theme} />;

            const unreadNotif = (profile.notificaciones || []).some(n=>!n.leida);
            const safeOps = profile.operaciones || [];

            const renderizarPantalla = () => {
                switch(vista) {
                    case 'inicio': return <InicioView operaciones={safeOps} perfil={profile} onOpenNotif={() => setVista('notificaciones')} unreadNotif={unreadNotif} onOpenSearch={() => setSearchOpen(true)} activeTheme={theme} />;
                    case 'historial': return <HistorialView operaciones={safeOps} onDeleteOR={handleBorrarOR} onEditOR={(o) => {setOrAEditar(o); setModalOR(true);}} onOpenNotif={() => setVista('notificaciones')} unreadNotif={unreadNotif} onOpenSearch={() => setSearchOpen(true)} />;
                    case 'galeria': return <GaleriaView operaciones={safeOps} onOpenNotif={() => setVista('notificaciones')} unreadNotif={unreadNotif} onOpenSearch={() => setSearchOpen(true)} />;
                    case 'perfil': return <PerfilView onNavegar={setVista} perfil={profile} setPerfil={updateProfile} onLogout={() => setActiveId(null)} />;
                    case 'configIncentivos': return <ConfiguradorIncentivosView onVolver={() => setVista('perfil')} incentives={profile.incentives || []} onUpdateIncentive={(id, cfg) => updateProfile({ incentives: profile.incentives.map(i => i.id === id ? {...i, ...cfg} : i) })} onCreateIncentive={() => updateProfile({ incentives: [...profile.incentives, { id: Date.now().toString(), nombre: 'Nuevo', pagoBase: 0, usarTramos: false, tramos: [] }] })} onDeleteIncentive={(id) => updateProfile({ incentives: profile.incentives.filter(i => i.id !== id) })} />;
                    case 'exportar': return <ExportarReportesView onVolver={() => setVista('perfil')} operaciones={safeOps} perfil={profile} />;
                    case 'notificaciones': return <PanelNotificaciones notificaciones={profile.notificaciones || []} onClose={() => setVista('inicio')} marcarLeidas={() => updateProfile({notificaciones: profile.notificaciones.map(n=>({...n, leida:true}))})} onDeleteNotif={(id) => updateProfile({notificaciones: profile.notificaciones.filter(n=>n.id!==id)})} />;
                    case 'personalizacion': return <PersonalizacionView onVolver={() => setVista('perfil')} perfil={profile} setPerfil={updateProfile} />;
                    case 'backup': return <CopiaSeguridadView onVolver={() => setVista('perfil')} perfiles={perfiles} lastThemeId={lastThemeId} />;
                    default: return <InicioView operaciones={safeOps} perfil={profile} onOpenNotif={() => setVista('notificaciones')} unreadNotif={unreadNotif} onOpenSearch={() => setSearchOpen(true)} activeTheme={theme} />;
                }
            };

            return (
                <div className="w-full h-full relative overflow-hidden" style={{
                    '--color-brand': theme.brand,
                    '--color-accent': theme.accent,
                    backgroundColor: bgAppColor
                }}>
                    {theme.id !== 'default' && (
                        <div className="absolute inset-0 flex items-center justify-center watermark-layer opacity-[0.04]">
                            <img src={getBrandIconUrl(theme, theme.accent)} className="w-[120%] object-contain" />
                        </div>
                    )}

                    <div className="absolute inset-0 z-10 flex flex-col h-full overflow-hidden pb-20">
                        {renderizarPantalla()}
                    </div>

                    <nav className="absolute bottom-0 w-full bg-white/95 backdrop-blur-xl border-t border-gray-100 flex justify-around items-center pb-8 pt-3 px-2 z-[100] h-24 rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
                        <button onClick={() => setVista('inicio')} className={`flex flex-col items-center gap-1 ${vista === 'inicio' ? 'text-accent scale-110' : 'text-gray-400 hover:text-brand'}`}><span className={`material-symbols-outlined text-[28px] ${vista === 'inicio' ? 'font-bold' : ''}`}>home</span><span className="text-[10px] font-black uppercase">Inicio</span></button>
                        <button onClick={() => setVista('historial')} className={`flex flex-col items-center gap-1 ${vista === 'historial' ? 'text-accent scale-110' : 'text-gray-400 hover:text-brand'}`}><span className={`material-symbols-outlined text-[28px] ${vista === 'historial' ? 'font-bold' : ''}`}>bar_chart</span><span className="text-[10px] font-black uppercase">Historial</span></button>
                        <div className="relative -top-8"><button onClick={() => {setOrAEditar(null); setModalOR(true);}} className="bg-accent text-white rounded-full w-[70px] h-[70px] flex items-center justify-center shadow-2xl border-[5px] border-white active:scale-95 transition"><span className="material-symbols-outlined text-4xl font-bold">add</span></button></div>
                        <button onClick={() => setVista('galeria')} className={`flex flex-col items-center gap-1 ${vista === 'galeria' ? 'text-accent scale-110' : 'text-gray-400 hover:text-brand'}`}><span className={`material-symbols-outlined text-[28px] ${vista === 'galeria' ? 'font-bold' : ''}`}>photo_library</span><span className="text-[10px] font-black uppercase">Galería</span></button>
                        <button onClick={() => setVista('perfil')} className={`flex flex-col items-center gap-1 ${['perfil','personalizacion','configIncentivos','exportar', 'backup'].includes(vista) ? 'text-accent scale-110' : 'text-gray-400 hover:text-brand'}`}><span className={`material-symbols-outlined text-[28px] ${['perfil','personalizacion','configIncentivos','exportar', 'backup'].includes(vista) ? 'font-bold' : ''}`}>person</span><span className="text-[10px] font-black uppercase">Perfil</span></button>
                    </nav>

                    {modalOR && <ModalOR onClose={() => {setModalOR(false); setOrAEditar(null);}} incentivesConfig={profile?.incentives || []} orAEditar={orAEditar} onGuardar={handleGuardarOR} operaciones={safeOps} />}
                    {searchOpen && <BuscadorModal operaciones={safeOps} onClose={() => setSearchOpen(false)} onEditOR={(o) => {setOrAEditar(o); setModalOR(true);}} onDeleteOR={handleBorrarOR} />}
                    
                    <div className="absolute top-10 left-4 right-4 z-[300] flex flex-col gap-2 pointer-events-none">
                        {toasts.map(t => (
                            <div key={t.id} className="bg-brand text-white p-4 rounded-2xl shadow-2xl flex items-center gap-3 animate-slide-down pointer-events-auto border border-white/10">
                                <span className="material-symbols-outlined bg-white/20 p-2 rounded-xl text-accent">check_circle</span>
                                <p className="text-sm font-bold flex-1">{t.msg}</p>
                                <button onClick={() => cerrarToast(t.id)} className="p-1"><span className="material-symbols-outlined text-gray-400 hover:text-white">close</span></button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
